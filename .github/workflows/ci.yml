name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build_and_lint:
    name: Lint & Build Check
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'Nexus/package-lock.json'

    - name: Install Dependencies
      run: npm ci
      working-directory: Nexus

    - name: Run ESLint
      run: npm run lint
      working-directory: Nexus

    - name: Type Check & Build
      run: npm run build
      working-directory: Nexus
      # Note: Vercel handles actual deployments. This is just to catch build errors early in PRs.
